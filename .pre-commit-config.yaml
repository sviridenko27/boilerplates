fail_fast: false
exclude: |
    (?x)^(
      .*\b(migrations)\b.*|
      .*\b(__pycache__)\b.*|
      .*\b(.git)\b.*
    )$
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-ast
      - id: check-case-conflict
      - id: check-json
      - id: check-toml
      - id: debug-statements
      - id: pretty-format-json
        args: [
          --autofix,
          --indent=4,
        ]
      - id: trailing-whitespace
      - id: no-commit-to-branch
        args: [
          --branch, dev,
        ]

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.13
    hooks:
      - id: ruff-check
      - id: ruff-format